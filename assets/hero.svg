<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1e2535" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Price chart sparkline (decorative) -->
  <polyline
    points="50,280 120,260 190,270 260,220 330,230 400,190 470,200 540,160 610,150 680,170 750,130 820,140 900,110 970,120 1050,90 1120,100 1150,80"
    fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)" opacity="0.6"/>

  <!-- Fill under sparkline -->
  <polygon
    points="50,280 120,260 190,270 260,220 330,230 400,190 470,200 540,160 610,150 680,170 750,130 820,140 900,110 970,120 1050,90 1120,100 1150,80 1150,400 50,400"
    fill="url(#accent)" opacity="0.05"/>

  <!-- Logo icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="50" height="50" rx="12" fill="url(#accent)" opacity="0.9"/>
    <text x="25" y="35" font-family="monospace" font-size="24" fill="white" text-anchor="middle">⚡</text>
  </g>

  <!-- Main title -->
  <text x="130" y="158" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="42" font-weight="700" fill="white" letter-spacing="-1">
    polymarket-trading-bot
  </text>

  <!-- Subtitle -->
  <text x="130" y="192" font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="18" fill="#8b92a5" letter-spacing="0">
    Open-source, pluggable trading bot for prediction markets
  </text>

  <!-- Tags -->
  <g transform="translate(130, 215)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#1e2535" stroke="#6366f1" stroke-width="1"/>
    <text x="60" y="19" font-family="monospace" font-size="12" fill="#6366f1" text-anchor="middle">TypeScript + Bun</text>
  </g>
  <g transform="translate(262, 215)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#1e2535" stroke="#8b5cf6" stroke-width="1"/>
    <text x="50" y="19" font-family="monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">MIT License</text>
  </g>
  <g transform="translate(374, 215)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#1e2535" stroke="#10b981" stroke-width="1"/>
    <text x="55" y="19" font-family="monospace" font-size="12" fill="#10b981" text-anchor="middle">Dry-run safe</text>
  </g>
  <g transform="translate(496, 215)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#1e2535" stroke="#f59e0b" stroke-width="1"/>
    <text x="65" y="19" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle">4 strategies built-in</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="380" width="1200" height="20" fill="url(#accent)" opacity="0.15"/>
</svg>
